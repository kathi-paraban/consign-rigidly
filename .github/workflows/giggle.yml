    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8361 }
          - { version: 6387 }
          - { version: 8676 }
          - { version: 8435 }
          - { version: 4016 }
          - { version: 2883 }
          - { version: 9745 }
